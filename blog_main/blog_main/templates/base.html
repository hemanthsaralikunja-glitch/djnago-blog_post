{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Pulse Blog{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: Georgia, serif; background: #f8f9fa; }
    .blog-header-logo { font-family: 'Playfair Display', serif; font-size: 2rem; }
    .nav-link { transition: color .2s ease; }
    .nav-link:hover, .nav-link.active { color: #0d6efd !important; }
    .featured-badge { background: #0d6efd; color: #fff; padding: .35rem .75rem; border-radius: 999px; font-size: .78rem; }
    .page-hero { min-height: 320px; background: linear-gradient(135deg, rgba(13,110,253,.85), rgba(13,110,253,.55)), url('https://images.unsplash.com/photo-1485217988980-11786ced9454?auto=format&fit=crop&w=1350&q=80') center/cover no-repeat; color: white; }
    .page-hero h1 { text-shadow: 0 8px 20px rgba(0,0,0,.25); }
    .post-card:hover { transform: translateY(-2px); }
    .post-card { transition: transform .2s ease; }
  </style>
</head>
<body>
  <div class="container">
    <header class="border-bottom py-3 mb-4">
      <div class="row flex-nowrap justify-content-between align-items-center">
        <div class="col-4">
          <a class="link-secondary" href="{% url 'about' %}">About</a>
        </div>
        <div class="col-4 text-center">
          <a class="blog-header-logo text-body-emphasis text-decoration-none" href="{% url 'home' %}">Pulse Blog</a>
        </div>
        <div class="col-4 d-flex justify-content-end">
          <a class="btn btn-sm btn-outline-secondary me-2" href="{% url 'contact' %}">Contact</a>
          <a class="btn btn-sm btn-outline-primary" href="{% url 'home' %}">Home</a>
        </div>
      </div>
    </header>

    <nav class="nav nav-underline justify-content-between mb-4">
      {% for category in categories %}
        <a class="nav-link link-body-emphasis" href="{% url 'category_posts' category.id %}">{{ category.category_name }}</a>
      {% endfor %}
    </nav>
  </div>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="py-5 text-center text-body-secondary bg-body-tertiary mt-5">
    <div class="container">
      <p class="mb-1">A modern blog project built with Django and Bootstrap.</p>
      <p class="mb-0"><a href="{% url 'contact' %}">Share feedback</a> · <a href="{% url 'about' %}">Meet the team</a></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
